// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Some upstream Capacitor plugins declare dynamic Google dependency
    // versions. Force the versions validated by this source revision so a
    // later Maven publication cannot silently change a release build.
    configurations.configureEach {
        resolutionStrategy {
            force 'com.google.android.gms:play-services-ads:24.9.0'
            force 'com.google.android.gms:play-services-games-v2:21.0.0'
            force 'com.android.billingclient:billing:8.3.0'
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
